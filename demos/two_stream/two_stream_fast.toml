# Two-stream demo with diagnostics/IO disabled for benchmarking/profiling.
# Physics parameters match `two_stream.toml`; only plotting/output toggles change.

[simulation_parameters]
name = "Demo of a TS instability with 3,000 electrons (fast)"
t_wind = 5.413e-8
solver = "fdtd"
Nx = 100
Ny = 1
Nz = 1
x_wind = 1
y_wind = 1
z_wind = 1
verbose = false
electrostatic = false
cfl = 0.99
shape_factor = 2
current_calculation = "j_from_rhov"
alpha = 1.0
relativistic = true

# Keep legacy default (x64) unless explicitly overridden.
enable_x64 = true
use_scan = true
scan_chunk = 256

[plotting]
plotting = false
plotting_interval = 1000000000
plot_phasespace = false
plot_openpmd_particles = false
plot_openpmd_fields = false
plot_vtk_particles = false
plot_vtk_scalars = false
plot_vtk_vectors = false
dump_particles = false
dump_fields = false

[particle1]
name = "electron1"
N_particles = 1500
charge = -1.602e-19
mass   = 9.1093837e-31
vth = 14989622.9
ds_per_debye = 8.0
initial_vx = 0.5e8

[particle2]
name = "electron2"
N_particles = 1500
charge = -1.602e-19
mass   = 9.1093837e-31
vth = 14989622.9
initial_vx = -0.5e8

[particle3]
name = "ion1"
N_particles = 3000
charge = 1.602e-19
mass = 1.67e-27
vth = 34982.78402326697
