# 1D Weibel instability (reduced) for benchmarking/profiling.

[simulation_parameters]
name = "Demo of a 1D Weibel instability (fast)"
Nt = 2000
solver = "fdtd"
Nx = 101
Ny = 1
Nz = 1
x_wind = 3e-1
y_wind = 1
z_wind = 1
x_bc = "periodic"
y_bc = "periodic"
z_bc = "periodic"
verbose = false
electrostatic = false
cfl = 0.99
shape_factor = 2
current_calculation = "j_from_rhov"
filter_j = "bilinear"
relativistic = true
enable_x64 = true
use_scan = true
scan_chunk = 256

[plotting]
plotting = false
plotting_interval = 1000000000
plot_phasespace = false
plot_openpmd_particles = false
plot_openpmd_fields = false
plot_vtk_particles = false
plot_vtk_scalars = false
plot_vtk_vectors = false
dump_particles = false
dump_fields = false

[particle1]
name = "electron1"
N_per_cell = 10
charge = -1.602e-19
mass   = 9.1093837e-31
ds_per_debye = 2.0
Tx     = 296494.82871735515
Tz     = 29649482.87173552
Ty     = 0

[particle2]
name = "ion1"
N_per_cell = 10
